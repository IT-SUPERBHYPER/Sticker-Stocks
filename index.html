<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Superb IT Sticker USAGE by Department</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@zxing/library@0.19.2/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
    <style>
        :root {
            /* Futuristic Theme Colors - Light Mode (Default) */
            --superb-blue: #0A192F; /* Deep navy for main background */
            --superb-accent: #00E6E6; /* Bright cyan/teal for accents */
            --superb-card: #FFFFFF; /* White cards for contrast */
            --superb-gradient: linear-gradient(135deg, #1A2A40 10%, #0A192F 100%); /* Subtle dark gradient */
            --text-main: #0A192F; /* Dark text on light cards */
            --chip-bg: linear-gradient(90deg, #00E6E6 0%, #00B3B3 100%); /* Cyan chip */
            --chip-txt: #0A192F; /* Dark text on bright chip */
            --tab-inactive-bg: #E0FFFF; /* Light background for inactive tab */
            --tab-inactive-text: #0A192F; /* Dark text for inactive tab */

            /* Toast Colors */
            --toast-success-bg: #28a745;
            --toast-error-bg: #dc3545;
            --toast-info-bg: #17a2b8;
            --toast-text: #fff;

            /* Chart Colors - Light Mode (Now with more vibrant gradients) */
            --chart-bar-start: #00B3B3; /* Darker blue-green for start of gradient */
            --chart-bar-end: #00FFFF; /* Brighter cyan-green for end of gradient */
            --chart-bar-border: #00E6E6; /* Accent border */
            --chart-text-color: #0A192F; /* Dark text on light background */
            --chart-grid-color: rgba(10, 25, 47, 0.05); /* Very subtle dark grid lines */
            --chart-tooltip-bg: rgba(0, 0, 0, 0.85);
            --chart-tooltip-text: #E0FFFF; /* Light cyan for tooltip text */
        }
        body.dark {
            /* Futuristic Theme Colors - Dark Mode */
            --superb-blue: #0A192F; /* Deep navy for main background */
            --superb-accent: #00E6E6; /* Bright cyan/teal for accents */
            --superb-card: #0A192F; /* Dark cards */
            --superb-gradient: linear-gradient(135deg, #0A192F 10%, #050C18 100%); /* Deeper dark gradient */
            --text-main: #E0FFFF; /* Light cyan text on dark background */
            --chip-bg: linear-gradient(90deg, #00E6E6 0%, #00B3B3 100%); /* Cyan chip */
            --chip-txt: #0A192F; /* Dark text on bright chip */
            --tab-inactive-bg: #1A2A40; /* Dark background for inactive tab */
            --tab-inactive-text: #E0FFFF; /* Light text for inactive tab */

            /* Dark mode toast colors */
            --toast-success-bg: #218838;
            --toast-error-bg: #c82333;
            --toast-info-bg: #138496;

            /* Chart Colors - Dark Mode (Now with more vibrant gradients) */
            --chart-bar-start: #00B3B3; /* Darker blue-green for start of gradient */
            --chart-bar-end: #00FFFF; /* Brighter cyan-green for end of gradient */
            --chart-bar-border: #00E6E6; /* Accent border */
            --chart-text-color: #E0FFFF; /* Light cyan for text */
            --chart-grid-color: rgba(0, 230, 230, 0.08); /* Subtle glowing grid lines */
            --chart-tooltip-bg: rgba(0, 0, 0, 0.85);
            --chart-tooltip-text: #E0FFFF; /* Light cyan for tooltip text */
        }
        html, body {
            min-height: 100vh;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: var(--superb-gradient);
            font-family: 'Inter', Arial, sans-serif;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            transition: background .4s ease, color .4s ease; /* Smoother transitions */
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            height: 100vh;
            width: 100vw;
        }
        header {
            background: var(--superb-card);
            box-shadow: 0 2px 12px rgba(0, 230, 230, 0.1); /* Subtle glow shadow */
            border-bottom: 2px solid var(--superb-accent); /* Thicker accent border */
            padding: 18px 0 10px 0;
            text-align: center;
            font-family: 'Orbitron', sans-serif; /* Futuristic font */
            font-size: 1.9rem; /* Slightly larger */
            font-weight: 700;
            letter-spacing: 2px; /* More spaced out */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--text-main);
            transition: background .3s ease, color .3s ease, border-color .3s ease;
        }
        .dark-toggle-btn {
            position: absolute;
            right: 15px; top: 12px;
            background: var(--superb-accent);
            color: var(--superb-blue); /* Dark text on bright button */
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 50%;
            width: 44px; height: 44px; /* Slightly larger */
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px var(--superb-accent); /* Glowing shadow */
            z-index: 200;
            transition: background .2s ease, box-shadow .2s ease, color .2s ease;
        }
        .dark-toggle-btn:hover {
            box-shadow: 0 0 20px var(--superb-accent);
        }
        .search-bar {
            display: flex;
            gap: 10px;
            background: var(--superb-card);
            padding: 12px 14px 10px 14px;
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid rgba(0, 230, 230, 0.2); /* Subtle accent border */
            align-items: center;
            flex-wrap: wrap;
            transition: background .3s ease, border-color .3s ease;
        }
        body.dark .search-bar { border-bottom: 1px solid rgba(0, 230, 230, 0.1); }
        .search-bar input, .search-bar select {
            font-size: 1.11rem;
            padding: 10px 11px;
            border: 1.5px solid var(--superb-accent); /* Accent border */
            border-radius: 8px;
            outline: none;
            width: 100%;
            max-width: 180px;
            background: var(--superb-card); /* Card background */
            color: var(--text-main);
            transition: background .3s ease, color .3s ease, border .3s ease, box-shadow .3s ease;
        }
        .search-bar input:focus, .search-bar select:focus {
            box-shadow: 0 0 10px var(--superb-accent); /* Glowing focus */
        }
        body.dark .search-bar input, body.dark .search-bar select {
            background: #0A192F; /* Dark input background */
            color: #E0FFFF; /* Light text */
            border-color: rgba(0, 230, 230, 0.5);
        }
        .download-pdf-btn {
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 8px;
            font-size: 1.6rem;
            vertical-align: middle;
            color: var(--superb-accent); /* Accent color */
            transition: color 0.18s ease;
            padding: 4px 0 0 0;
            outline: none;
        }
        .download-pdf-btn:active { color: #00B3B3; }
        .badge {
            display: inline-block;
            min-width: 22px;
            padding: 2px 8px;
            font-size: 13px;
            background: var(--chip-bg);
            color: var(--chip-txt);
            border-radius: 12px;
            margin-left: 7px;
            font-weight: 700;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(0, 230, 230, 0.3); /* Subtle glow */
        }
        .asset-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1 1 auto;
            overflow-y: auto;
            background: transparent;
        }
        .asset-card {
            background: var(--superb-card);
            margin: 12px 11px 0 11px;
            border-radius: 13px;
            box-shadow: 0 2px 14px rgba(0, 230, 230, 0.1); /* Subtle glow */
            border: 1px solid rgba(0, 230, 230, 0.15); /* Subtle accent border */
            transition: box-shadow .2s ease, border .2s ease, background .2s ease;
            position: relative;
        }
        body.dark .asset-card {
            background: #0A192F; /* Dark card background */
            border: 1px solid rgba(0, 230, 230, 0.1);
        }
        .asset-card-header {
            font-weight: 600;
            font-size: 1.11rem;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            color: var(--text-main);
        }
        .asset-card .expand-icon {
            margin-left: 8px;
            font-size: 1.44rem;
            color: var(--superb-accent);
            transition: transform .2s ease;
        }
        .asset-card.open .expand-icon { transform: rotate(90deg);}
        .asset-card.open {
            box-shadow: 0 6px 28px rgba(0, 230, 230, 0.3); /* More pronounced glow when open */
            border-color: var(--superb-accent);
        }
        .asset-details {
            display: none;
            padding: 10px 22px 14px 22px;
            font-size: 1.03rem;
            animation: fadein .22s ease;
            color: var(--text-main);
        }
        .asset-card.open .asset-details { display: block;}
        .asset-details label { font-weight: 600;}
        .asset-details .chip {
            display: inline-block;
            background: var(--chip-bg);
            color: var(--chip-txt);
            border-radius: 6px;
            font-size: 13.5px;
            font-weight: 600;
            padding: 2px 9px;
            margin-right: 6px;
            box-shadow: 0 0 8px rgba(0, 230, 230, 0.3); /* Subtle glow */
        }
        .asset-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            border: none;
            outline: none;
            font-size: 1.12rem;
            border-radius: 8px;
            font-weight: 700;
            padding: 11px 23px;
            cursor: pointer;
            background: linear-gradient(90deg, #00E6E6 0%, #00B3B3 100%); /* Cyan gradient */
            color: var(--superb-blue); /* Dark text on bright button */
            transition: background .2s ease, opacity .2s ease, box-shadow .2s ease, transform .1s ease; /* Added transform */
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(0, 230, 230, 0.4); /* Glowing button shadow */
        }
        .btn:hover {
            box-shadow: 0 0 18px rgba(0, 230, 230, 0.6);
            transform: translateY(-1px); /* Slight lift on hover */
        }
        .btn.delete {
            background: linear-gradient(90deg, #FF6B6B 0%, #E63946 100%); /* Red gradient for delete */
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.4);
            color: #0A192F;
        }
        .btn.delete:hover {
            box-shadow: 0 0 18px rgba(255, 107, 107, 0.6);
        }
        .btn.cancel {
            background: #334455; /* Darker grey for cancel */
            color: #E0FFFF; /* Light text */
            box-shadow: none;
        }
        .btn.cancel:hover {
            background: #445566;
            transform: translateY(-1px);
        }
        .btn.scan {
            background: linear-gradient(90deg, #21DB9D 0%, #00E6E6 100%);
            color: var(--superb-blue);
            margin-left: 6px;
            border-radius: 8px;
            padding: 11px 15px;
            box-shadow: 0 0 12px rgba(33, 219, 157, 0.4);
            font-size: 1rem;
        }
        .btn.scan:hover {
            box-shadow: 0 0 18px rgba(33, 219, 157, 0.6);
        }
        /* Loading Spinner for Buttons */
        .btn.loading {
            opacity: 0.8;
            pointer-events: none;
        }
        .btn .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.15s;
        }
        .btn.loading .spinner {
            opacity: 1;
        }
        .btn.loading span {
            visibility: hidden;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .fab-container {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between FABs */
            align-items: flex-end; /* Align FABs to the right */
        }
        .fab {
            width: 62px; height: 62px;
            background: linear-gradient(90deg, #00E6E6 0%, #00B3B3 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 230, 230, 0.5); /* Stronger glow */
            font-size: 2.5rem;
            color: var(--superb-blue); /* Dark text on bright FAB */
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: box-shadow .2s ease, background .2s ease, transform .15s ease; /* Added transform */
        }
        .fab:hover {
            box-shadow: 0 0 30px rgba(0, 230, 230, 0.7);
            transform: translateY(-2px); /* Slight lift on hover */
        }
        .fab.deduct {
            background: linear-gradient(90deg, #FF6B6B 0%, #E63946 100%); /* Red gradient for deduct */
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
            color: var(--superb-blue);
        }
        .fab.deduct:hover {
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.7);
        }
        @media (min-width: 700px) {
            .fab { width: 74px; height: 74px; font-size: 2.9rem;}
            .form-card { min-width: 420px; }
            .stats-card {
                min-width: 420px;
                max-width: 700px;
                padding: 22px 25px 25px 25px;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .stats-card h3 {
                width: 100%;
                order: -1;
                margin-bottom: 15px;
            }
            .stats-summary {
                width: 100%;
                order: 0;
                margin-bottom: 25px;
            }
            .chart-container {
                width: 48%;
                flex-shrink: 0;
                height: 300px;
            }
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: none;}
        }
        #scanner-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95); /* Very dark overlay */
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2500; flex-direction: column;
            animation: fadein 0.33s ease;
        }
        #scanner-container video {
            border-radius: 12px;
            max-width: 97vw;
            max-height: 55vh;
            box-shadow: 0 0 50px rgba(0, 230, 230, 0.7); /* Intense glow for scanner */
            border: 2px solid var(--superb-accent);
        }
        #scanner-close {
            background: linear-gradient(90deg, #FF6B6B 0%, #E63946 100%);
            color: #0A192F;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            padding: 10px 38px;
            margin-top: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
            letter-spacing: 0.7px;
            transition: background 0.19s ease, box-shadow 0.19s ease;
        }
        #scanner-close:active { background: #b82812; }
        #scanner-status {
            color: #E0FFFF; /* Light cyan status text */
            margin-top: 12px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-shadow: 0 0 10px rgba(0, 230, 230, 0.8); /* Glowing text */
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background-color: var(--toast-info-bg);
            color: var(--toast-text);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            transform: translateY(20px);
            min-width: 250px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.1px;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.success { background-color: #218838; }
        .toast.error { background-color: #c82333; }

        /* Statistics Modal Specific Styles */
        #formModal, #statsModal, #confirmationModal, #geminiOutputModal { /* Added geminiOutputModal */
            position: fixed; left: 0; top: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); /* Darker, more opaque overlay */
            backdrop-filter: blur(5px); /* Subtle blur effect */
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }
        #formModal.show, #statsModal.show, #confirmationModal.show, #geminiOutputModal.show { display: flex;} /* Added geminiOutputModal */
        .form-card, .stats-card, .confirmation-card, .gemini-card { /* Added gemini-card */
            background: var(--superb-card);
            border-radius: 15px;
            padding: 22px 16px 15px 16px;
            min-width: 90vw; max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 230, 230, 0.6); /* Stronger glow for modals */
            color: var(--text-main);
            animation: fadein .28s ease;
            transition: background .3s ease, color .3s ease;
            position: relative;
            overflow-y: auto;
            max-height: 95vh;
            border: 1px solid var(--superb-accent); /* Accent border for modals */
        }
        body.dark .form-card, body.dark .stats-card, body.dark .confirmation-card, body.dark .gemini-card { /* Added gemini-card */
            background: #0A192F; /* Dark modal background */
            border: 1px solid rgba(0, 230, 230, 0.4);
        }
        .form-card form {
            display: flex;
            flex-direction: column;
            gap: 13px;
        }
        /* Form input styling */
        .form-card input, .form-card select, .form-card textarea {
            padding: 10px 12px;
            border: 1px solid rgba(0, 230, 230, 0.3); /* Subtle accent border */
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            background: var(--superb-card);
            transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
        }
        body.dark .form-card input, body.dark .form-card select, body.dark .form-card textarea {
            background: #050C18; /* Even darker input background */
            border-color: rgba(0, 230, 230, 0.2);
            color: var(--text-main);
        }
        .form-card input:focus, .form-card select:focus, .form-card textarea:focus {
            outline: none;
            border-color: var(--superb-accent);
            box-shadow: 0 0 10px rgba(0, 230, 230, 0.5); /* Glowing focus */
        }
        .form-card input.invalid, .form-card select.invalid, .form-card textarea.invalid {
            border-color: #FF6B6B; /* Red for invalid */
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        .stats-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-main);
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            transition: color 0.2s ease;
        }
        .stats-close-btn:hover {
            color: var(--superb-accent);
        }
        .stats-card h3 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--text-main);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .stats-summary {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 230, 230, 0.1);
            padding-bottom: 15px;
            text-align: center;
            color: var(--text-main);
        }
        .stats-summary p {
            margin: 5px 0;
            font-size: 1.1em;
            font-weight: 600;
        }
        /* Chart Containers for responsiveness */
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 230, 230, 0.1);
            box-shadow: 0 0 15px rgba(0, 230, 230, 0.2);
        }
        .chart-container h4 {
            text-align: center;
            color: var(--superb-accent);
            margin-top: 0;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.8px;
            text-shadow: 0 0 5px rgba(0, 230, 230, 0.5);
        }
        @media (min-width: 700px) {
            .chart-container {
                height: 350px;
            }
            .stats-card {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-around;
                align-items: flex-start;
                padding-top: 35px;
            }
            .stats-card h3 {
                width: 100%;
                order: -1;
                margin-bottom: 15px;
            }
            .stats-summary {
                width: 100%;
                order: 0;
                margin-bottom: 25px;
            }
            .chart-container {
                width: 48%;
                flex-shrink: 0;
                height: 300px;
            }
        }
        .footer {
            text-align: center; margin-top: 13px; margin-bottom: 14px;
            color: rgba(0, 230, 230, 0.6); /* Subtle cyan for footer */
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        body.dark .footer { color: rgba(0, 230, 230, 0.4);}

        /* Tab Styles */
        .tabs-container {
            display: flex;
            justify-content: center;
            background: var(--superb-card);
            border-bottom: 1px solid rgba(0, 230, 230, 0.2);
            padding: 0 10px;
            gap: 5px;
            position: sticky;
            top: 0; /* stick below search bar if it's sticky too */
            z-index: 19; /* below search bar, above asset list */
            transition: background .3s ease, border-color .3s ease;
        }
        .tab-button {
            padding: 10px 15px;
            border: none;
            background: var(--tab-inactive-bg);
            color: var(--tab-inactive-text);
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 8px 8px 0 0; /* Rounded top corners */
            transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
            flex-grow: 1; /* Allow tabs to grow and fill space */
            text-align: center;
            max-width: 200px; /* Limit tab width on larger screens */
        }
        .tab-button.active {
            background: var(--superb-accent);
            color: var(--superb-blue);
            box-shadow: 0 -3px 15px rgba(0, 230, 230, 0.4); /* Glow from active tab */
            position: relative;
            z-index: 2; /* Bring active tab slightly forward */
        }
        .tab-button:hover:not(.active) {
            background: rgba(0, 230, 230, 0.1); /* Subtle hover for inactive */
